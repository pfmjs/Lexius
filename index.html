<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexius</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://microsoft.github.io/vscode-codicons/dist/codicon.css">
</head>
<body>
    <main class="main">
        <div class="top-bar">
            <main class="top-bar-main">
                <div class="logo">
                    <img src="images/logo.svg" alt="">
                </div>
                <div class="file">
                    <button data="false">File</button>
                    <button data="false">Folder</button>
                    <button data="false">Find</button>
                </div>
            </main>
        </div>
        <div class="side-bar">
            <img src="images\files.svg" alt="">
            <img src="images\search.svg" alt="">
            <i class="codicon codicon-broadcast" aria-hidden="true"></i>
            <i class="codicon codicon-extensions bold" aria-hidden="true"></i>
        </div>
        <div class="Lexius">

        </div>
        <div class="bottom-bar">

        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
