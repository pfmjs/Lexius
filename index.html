<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexius</title>
    <link rel="stylesheet" href="https://unpkg.com/monaco-editor@0.39.1/min/vs/editor/editor.main.css">
    <link rel="shortcut icon" href="images/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://microsoft.github.io/vscode-codicons/dist/codicon.css">
</head>
<body>
    <main class="main">
        <div class="top-bar">
            <main class="top-bar-main">
                <div class="logo">
                    <img src="images/logo.svg" alt="">
                </div>
                <div class="file">
                    <button data="false">File</button>
                </div>
                <div class="folder">
                    <button data="false">Folder</button>
                </div>
                <div class="find">
                    <button data="false">Find</button>
                </div>
            </main>
        </div>
        <main class="text-editor">
            <div>
                <div class="side-bar">
                    <button data="false"><img src="images\search.svg" alt=""></button>
                    <button data="false"><i class="codicon codicon-broadcast" aria-hidden="true"></i></button>
                    <button data="false"><i class="codicon codicon-extensions bold" aria-hidden="true"></i></button>
                </div>
            </div>
            <div class="Lexius">
                <div id="editor"></div> <!-- width is 100vw and height is 100vh -->
            </div>
        </main>
    </main>
    <script src="scripts/index.js"></script>
    <script src="extension/Live Server/index.js"></script>
    <script src="https://unpkg.com/monaco-editor@0.39.0/min/vs/loader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            require.config({
                paths: {
                    'vs': 'https://unpkg.com/monaco-editor@0.39.0/min/vs'
                }
            });

            require(['vs/editor/editor.main'], function () {
                monaco.editor.create(document.getElementById('editor'), {
                    value: ``,
                    language: 'html',
                    theme: 'vs-dark'
                });
            });
        });
    </script>
</body>
</html>
